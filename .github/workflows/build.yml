name: Build and test
on:
  push:
    branches:
    - master
  pull_request:
jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: install packages
      run: sudo apt update && sudo apt install nettle-dev clang-tidy
    - name: cmake
      run: cmake -B build -DUSE_NETTLE=1 -DWARNINGS_AS_ERRORS=1 -DCLANG_TIDY=ON
    - name: make
      run: (cd build; make)
    - name: test
      run: ./build/tests
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: cmake
      run: cmake -B build -DWARNINGS_AS_ERRORS=1 -DENABLE_LOCAL_ADDRESS_TRANSLATION=1
    - name: make
      run: (cd build; make)
    - name: test
      run: ./build/tests
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: ilammy/msvc-dev-cmd@v1
    - name: cmake
      run: cmake -B build -G "NMake Makefiles" -DWARNINGS_AS_ERRORS=1
    - name: nmake
      run: |
        cd build
        nmake
    - name: test
      run: build/tests.exe
  build-switch:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/d3fau4/nx-dev:latest
    steps:
    - uses: actions/checkout@v4
    - name: cmake
      run: cmake -B build-switch -DCMAKE_TOOLCHAIN_FILE=cmake/toolchain-switch.cmake -DBUILD_SHARED_LIBS=OFF -DNO_TESTS=ON -DCMAKE_BUILD_TYPE=Release
    - name: make
      run: cmake --build build-switch --target juice-static
    - name: upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libjuice-switch
        path: build-switch/libjuice-static.a

